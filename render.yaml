services:
  # ------------- BACKEND (FastAPI) -------------
  - type: web
    name: driverpulse-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CORS_ORIGIN
        value: "*" # Set this to your frontend URL later for security

  # ------------- FRONTEND (Next.js) -------------
  - type: web
    name: driverpulse-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      # Provide the URL of your backend once Render gives it to you
      - key: NEXT_PUBLIC_API_URL
        value: "" 
